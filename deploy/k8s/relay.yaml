# OpenMesh relay server on k3s.
#
# Forwards encrypted packets between peers that can't reach each other directly
# (e.g. both behind NAT). Pinned to the public-IP control-plane node and published
# on hostPort 4434/UDP, so clients reach it at <node-public-ip>:4434.
#
#   kubectl apply -f deploy/k8s/relay.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  namespace: openmesh
  labels:
    app: relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay
  template:
    metadata:
      labels:
        app: relay
    spec:
      nodeSelector:
        kubernetes.io/hostname: srv1237670
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: relay
          image: ghcr.io/ragnar-vallhala/openmesh-relay:latest
          imagePullPolicy: Always
          args: ["0.0.0.0", "4434"]
          ports:
            - name: relay-udp
              containerPort: 4434
              hostPort: 4434 # binds <node-ip>:4434/udp
              protocol: UDP
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            # No CPU request/limit (the control-plane node is fully committed on
            # CPU requests; the relay is I/O-bound). Memory only.
            requests:
              memory: 32Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: relay
  namespace: openmesh
spec:
  selector:
    app: relay
  ports:
    - name: relay-udp
      port: 4434
      targetPort: 4434
      protocol: UDP
